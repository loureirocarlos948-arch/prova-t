<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarefa T3</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#e6e6e6;
}

/* MENU */
.menu{
    background-color:#8cc63f;
    padding:20px;
    text-align:center;
}

.menu ul{
    list-style:none;
    padding:0;
    margin:0;
}

.menu ul li{
    display:inline-block;
    margin:0 15px;
}

.menu ul li a{
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* SIDEBAR */
.sidebar{
    background-color:#8cc63f;
    padding:40px;
    text-align:center;
    font-weight:bold;
    font-size:24px;
}

/* GALERIA */
.galeria{
    display:flex;
    justify-content:space-around;
    padding:40px;
}

.galeria img{
    width:250px;
    height:300px;
    object-fit:cover;
    border:3px solid black;
}

/* TEXTOS */
.textos{
    display:flex;
    justify-content:space-around;
    padding:40px;
}

.texto{
    width:40%;
    background-color:#8cc63f;
    padding:30px;
    font-weight:bold;
    text-align:center;
    border:3px solid black;
}

/* FOOTER */
.footer{
    background-color:#8cc63f;
    text-align:center;
    padding:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
    <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Serviços</a></li>
        <li><a href="#">Contacto</a></li>
    </ul>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    SIDE BAR
</div>

<!-- FOTOS -->
<div class="galeria">
    <img src="https://picsum.photos/300/400?1" alt="Imagem 1">
    <img src="https://picsum.photos/300/400?2" alt="Imagem 2">
    <img src="https://picsum.photos/300/400?3" alt="Imagem 3">
</div>

<!-- TEXTOS -->
<div class="textos">
    <div class="texto">
        Este é um bloco de texto.  
        Aqui podes escrever informações importantes do site.
    </div>

    <div class="texto">
        Este é outro bloco de texto.  
        Pode ser usado para notícias ou descrição.
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    FOOTER - © 2026 Meu Site
</div>

</body>
</html>
